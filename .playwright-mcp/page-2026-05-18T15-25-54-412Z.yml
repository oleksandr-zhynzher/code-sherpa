              - text: "|---|---|---|"
              - text: "| Reuse behavior | Child class inherits from parent class | Object delegates to prototype object |"
              - text: "| Main relationship | Class → instance | Object → prototype |"
              - text: "| Behavior sharing | Via class methods | Via prototype methods |"
            - paragraph [ref=e167]: "So even when you write:"
