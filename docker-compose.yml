networks:
  code-sherpa:
    driver: bridge

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: code-sherpa-api
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    ports:
      - '127.0.0.1:8000:8000'
    volumes:
      - ./workspace:/app/workspace
      - ./.code-sherpa:/app/.code-sherpa
      # Mount host CLI tools so the API can run copilot/claude from the host PATH
      - /usr/local/bin:/usr/local/bin:ro
      - /opt/homebrew/bin:/opt/homebrew/bin:ro
      # Mount host GitHub CLI config for Copilot CLI authentication
      - ${HOME}/.config/gh:/root/.config/gh:ro
    networks:
      - code-sherpa
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8000/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: code-sherpa-web
    environment:
      NEXT_TELEMETRY_DISABLED: '1'
      # Browser-side URL — browser talks directly to the API on the host
      NEXT_PUBLIC_API_URL: 'http://127.0.0.1:8000'
    ports:
      - '127.0.0.1:3000:3000'
    networks:
      - code-sherpa
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
