        - article [ref=e208]:
          - generic [ref=e209]:
            - paragraph [ref=e210]: "# Prototype Basics"
            - paragraph [ref=e211]: JavaScript objects can **share behavior** through prototypes. Instead of copying the same method into every object, JavaScript lets one object delegate to another. That delegation system is the foundation of **prototypes** and the **prototype chain**.
            - paragraph [ref=e212]: "---"
            - paragraph [ref=e213]: "## 1. What a Prototype Is"
            - paragraph [ref=e214]: "### Core idea"
            - paragraph [ref=e215]: A **prototype** is another object that JavaScript uses as a fallback source of properties and methods.
            - paragraph [ref=e216]: If an object does not have a property directly on itself, JavaScript can look for it on that object's prototype.
            - paragraph [ref=e217]: "That is why prototypes exist: they let many objects **reuse the same behavior** without duplicating code."
            - paragraph [ref=e218]: "---"
            - paragraph [ref=e219]: "### Why JavaScript uses prototypes"
            - paragraph [ref=e220]: "In many class-based languages, inheritance is described as:"
            - paragraph [ref=e221]: "- a class defines behavior - objects are created from that class - subclasses inherit from parent classes"
            - paragraph [ref=e222]: "JavaScript can support `class` syntax, but under the hood it still uses **prototypes**."
            - paragraph [ref=e223]: "High-level comparison:"
            - paragraph [ref=e224]: "| Idea | Class-based style | Prototype-based style | |---|---|---| | Reuse behavior | Child class inherits from parent class | Object delegates to prototype object | | Main relationship | Class → instance | Object → prototype | | Behavior sharing | Via class methods | Via prototype methods |"
            - paragraph [ref=e225]: "So even when you write:"
            - paragraph [ref=e226]: "```ts class User { sayHi() { return \"Hi\"; } } ```"
            - paragraph [ref=e227]: JavaScript still connects objects through prototypes behind the scenes.
            - paragraph [ref=e228]: "---"
            - paragraph [ref=e229]: "### What `[[Prototype]]` means"
            - paragraph [ref=e230]: "`[[Prototype]]` is the internal link from one object to another object."
            - paragraph [ref=e231]: "Beginner-friendly definition:"
            - paragraph [ref=e232]: "> `[[Prototype]]` is the hidden connection that tells JavaScript, “If you do not find a property here, go look there next.”"
            - paragraph [ref=e233]: "You usually do **not** access `[[Prototype]]` directly. Just know that it is the mechanism behind property lookup."
            - paragraph [ref=e234]: "---"
            - paragraph [ref=e235]: "### How objects share behavior"
            - paragraph [ref=e236]: Suppose many objects need the same method. Instead of storing that method separately in each object, you can put it on a shared prototype.
            - paragraph [ref=e237]: Then each object can “inherit” that behavior by delegation.
            - paragraph [ref=e238]: "### Example 1: Shared behavior through a prototype"
            - paragraph [ref=e239]: "```ts const animalMethods = { speak(): string { return \"Some sound\"; } };"
            - paragraph [ref=e240]: const dog = Object.create(animalMethods); dog.name = "Rex";
            - paragraph [ref=e241]: const cat = Object.create(animalMethods); cat.name = "Milo";
            - paragraph [ref=e242]: "console.log(dog.speak()); // \"Some sound\" console.log(cat.speak()); // \"Some sound\" ```"
            - paragraph [ref=e243]: "`dog` and `cat` do not each contain their own `speak` method. They both reuse the one from `animalMethods`."
            - paragraph [ref=e244]: "### Example 2: Own properties vs prototype properties"
            - paragraph [ref=e245]: "```ts const personPrototype = { greet(): string { return `Hello, ${this.name}`; } };"
            - paragraph [ref=e246]: const person = Object.create(personPrototype); person.name = "Ava";
            - paragraph [ref=e247]: "console.log(person.name); // \"Ava\" -> own property console.log(person.greet()); // \"Hello, Ava\" -> from prototype ```"
            - paragraph [ref=e248]: "Here:"
            - paragraph [ref=e249]: "- `name` lives directly on `person` - `greet` is found on `person`'s prototype"
            - paragraph [ref=e250]: "---"
            - paragraph [ref=e251]: "### Mental model"
            - paragraph [ref=e252]: "Think of an object as a student taking a test:"
            - paragraph [ref=e253]: "1. First, the student checks **their own paper** 2. If the answer is not there, they check the **shared class notes** 3. If still not there, they check the **next shared source** 4. If nobody has the answer, the result is **`undefined`**"
            - paragraph [ref=e254]: That “check here, then check above” behavior is prototype lookup.
            - paragraph [ref=e255]: "---"
            - paragraph [ref=e256]: "### Common misconceptions"
            - paragraph [ref=e257]: "#### 1. “The prototype copies methods into every object.” No. Usually the object **does not copy** the method. It **looks up** the method on the prototype when needed."
            - paragraph [ref=e258]: "#### 2. “`class` means prototypes are not involved.” Not true. JavaScript `class` syntax is a cleaner way to write code that still relies on prototypes underneath."
            - paragraph [ref=e259]: "#### 3. “Prototype inheritance is the same as class inheritance.” They are related, but not identical. In JavaScript, objects are linked to other objects. That object-to-object delegation is the key idea."
            - paragraph [ref=e260]: "---"
            - paragraph [ref=e261]: "### One small code-oriented example"
            - paragraph [ref=e262]: "```ts const runner = { run(): string { return \"Running\"; } };"
            - paragraph [ref=e263]: const athlete = Object.create(runner);
            - paragraph [ref=e264]: "console.log(athlete.run()); // \"Running\" ```"
            - paragraph [ref=e265]: "`athlete` has no `run` method directly, but JavaScript finds it on `runner`."
            - paragraph [ref=e266]: "---"
            - paragraph [ref=e267]: "### Quick check"
            - paragraph [ref=e268]: 1. If an object does not have a method directly, where does JavaScript look next? **Answer:** On its prototype.
            - paragraph [ref=e269]: 2. Is a prototype mainly about copying behavior or sharing behavior? **Answer:** Sharing behavior.
            - paragraph [ref=e270]: "3. Does JavaScript `class` replace prototypes completely? **Answer:** No, `class` uses prototypes underneath."
            - paragraph [ref=e271]: "---"
            - paragraph [ref=e272]: "## 2. The Prototype Chain"
            - paragraph [ref=e273]: "### Core idea"
            - paragraph [ref=e274]: "When JavaScript evaluates `obj.value`, it searches in steps:"
            - paragraph [ref=e275]: "1. Check whether `obj` has its own property called `value` 2. If not, check `obj`'s prototype 3. If not there, check that prototype's prototype 4. Keep going upward 5. If the property is never found, return **`undefined`**"
            - paragraph [ref=e276]: This upward search is called the **prototype chain**.
            - paragraph [ref=e277]: "---"
            - paragraph [ref=e278]: "### How property lookup works"
            - paragraph [ref=e279]: "When JavaScript sees:"
            - paragraph [ref=e280]: "```ts obj.value ```"
            - paragraph [ref=e281]: it does **not** magically search everywhere at once.
            - paragraph [ref=e282]: It follows a chain.
            - paragraph [ref=e283]: "### Lookup path diagram"
            - paragraph [ref=e284]: "- `obj` - if `value` exists here, use it - otherwise go to `obj`'s prototype - if `value` exists there, use it - otherwise go to that prototype's prototype - if `value` exists there, use it - continue until the chain ends - if not found anywhere - result is `undefined`"
            - paragraph [ref=e285]: "---"
            - paragraph [ref=e286]: "### Another diagram"
            - paragraph [ref=e287]: "- `obj` - `[[Prototype]]` → `parent` - `[[Prototype]]` → `grandparent` - `[[Prototype]]` → `null`"
            - paragraph [ref=e288]: "`null` means the chain has ended. There is nowhere else to search."
            - paragraph [ref=e289]: "---"
            - paragraph [ref=e290]: "### Example with `Object.create`"
            - paragraph [ref=e291]: "```ts const base = { value: 10 }; const child = Object.create(base);"
            - paragraph [ref=e292]: "console.log(child.value); // 10 ```"
            - paragraph [ref=e293]: Why?
            - paragraph [ref=e294]: "- `child` does not have its own `value` - JavaScript goes to `base` - `base.value` exists, so the answer is `10`"
            - paragraph [ref=e295]: "---"
            - paragraph [ref=e296]: "### Example with multiple levels"
            - paragraph [ref=e297]: "```ts const grandparent = { value: 100 }; const parent = Object.create(grandparent); const child = Object.create(parent);"
            - paragraph [ref=e298]: "console.log(child.value); // 100 ```"
            - paragraph [ref=e299]: "Search path:"
            - paragraph [ref=e300]: "- check `child` -> not found - check `parent` -> not found - check `grandparent` -> found `100`"
            - paragraph [ref=e301]: "---"
            - paragraph [ref=e302]: "### What if the property is missing everywhere?"
            - paragraph [ref=e303]: "```ts const a = {}; const b = Object.create(a);"
            - paragraph [ref=e304]: "console.log(b.missing); // undefined ```"
            - paragraph [ref=e305]: "If JavaScript reaches the end of the prototype chain and never finds `missing`, it returns `undefined`."
            - paragraph [ref=e306]: "---"
            - paragraph [ref=e307]: "### Shadowing: own property wins"
            - paragraph [ref=e308]: If both the object and its prototype have the same property name, the object's own property wins.
            - paragraph [ref=e309]: "```ts const base = { value: 10 }; const child = Object.create(base); child.value = 50;"
            - paragraph [ref=e310]: "console.log(child.value); // 50 console.log(base.value); // 10 ```"
            - paragraph [ref=e311]: This is called **shadowing**.
            - paragraph [ref=e312]: "---"
            - paragraph [ref=e313]: "### One small code-oriented example"
            - paragraph [ref=e314]: "```ts const vehicle = { move(): string { return \"Moving\"; } };"
            - paragraph [ref=e315]: const bike = Object.create(vehicle);
            - paragraph [ref=e316]: "console.log(bike.move()); // \"Moving\" ```"
            - paragraph [ref=e317]: "`bike` does not define `move`, so JavaScript finds it higher in the chain."
            - paragraph [ref=e318]: "---"
            - paragraph [ref=e319]: "### Common pitfalls"
            - paragraph [ref=e320]: "#### 1. Forgetting that own properties are checked first If `child.value` exists directly on `child`, JavaScript will use it before checking the prototype."
            - paragraph [ref=e321]: "#### 2. Thinking “not found” causes an error immediately Accessing a missing property gives `undefined`. The error usually comes later if you try to use `undefined` like a function."
            - paragraph [ref=e322]: "#### 3. Assuming `Object.create(proto)` copies everything It does not copy. It creates a new object whose prototype is `proto`."
            - paragraph [ref=e323]: "---"
            - paragraph [ref=e324]: "## Prediction practice"
            - paragraph [ref=e325]: Try to guess the output **before** reading the answer.
            - paragraph [ref=e326]: "### 1. Prediction"
            - paragraph [ref=e327]: "```ts const base = { x: 1 }; const obj = Object.create(base);"
            - paragraph [ref=e328]: "console.log(obj.x); ```"
            - paragraph [ref=e329]: "**Answer:** `1`"
            - paragraph [ref=e330]: "Because `obj` does not have `x`, so JavaScript finds `x` on `base`."
            - paragraph [ref=e331]: "---"
            - paragraph [ref=e332]: "### 2. Prediction"
            - paragraph [ref=e333]: "```ts const base = { x: 1 }; const obj = Object.create(base); obj.x = 5;"
            - paragraph [ref=e334]: "console.log(obj.x); ```"
            - paragraph [ref=e335]: "**Answer:** `5`"
            - paragraph [ref=e336]: "The own property `obj.x` shadows `base.x`."
            - paragraph [ref=e337]: "---"
            - paragraph [ref=e338]: "### 3. Prediction"
            - paragraph [ref=e339]: "```ts const grand = { y: 9 }; const parent = Object.create(grand); const child = Object.create(parent);"
            - paragraph [ref=e340]: "console.log(child.y); ```"
            - paragraph [ref=e341]: "**Answer:** `9`"
            - paragraph [ref=e342]: "JavaScript checks `child`, then `parent`, then `grand`."
            - paragraph [ref=e343]: "---"
            - paragraph [ref=e344]: "### 4. Prediction"
            - paragraph [ref=e345]: "```ts const base = {}; const obj = Object.create(base);"
            - paragraph [ref=e346]: "console.log(obj.z); ```"
            - paragraph [ref=e347]: "**Answer:** `undefined`"
            - paragraph [ref=e348]: The property is not found anywhere in the chain.
            - paragraph [ref=e349]: "---"
            - paragraph [ref=e350]: "## Practice guidance"
            - paragraph [ref=e351]: "When learning prototypes, focus on these habits:"
            - paragraph [ref=e352]: "1. For every property access, ask: **“Is it on the object itself, or on its prototype?”** 2. Trace lookup step by step: **object → prototype → higher prototype → `null`** 3. Practice with small `Object.create` examples before mixing in `class` syntax 4. Test shadowing by giving both the object and its prototype the same property name"
            - paragraph [ref=e353]: "A strong mental shortcut is:"
            - paragraph [ref=e354]: "> **Objects store their own data, and prototypes provide shared behavior.**"
            - paragraph [ref=e355]: Once that clicks, the prototype chain becomes much easier to read and predict.
